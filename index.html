  :root {
    --bg: #0f1117;
    --bg-card: #181b24;
    --bg-card-hover: #1e2230;
    --bg-surface: #232738;
    --text: #e8e6e1;
    --text-dim: #8a8d9b;
    --text-muted: #555869;
    --accent: #e07c4a;
    --accent-bg: rgba(224,124,74,0.10);
    --flight: #e07c4a;
    --flight-bg: rgba(224,124,74,0.10);
    --stay: #5c8ee0;
    --stay-bg: rgba(92,142,224,0.10);
    --train: #d4a843;
    --train-bg: rgba(212,168,67,0.10);
    --bus: #6bc76b;
    --bus-bg: rgba(107,199,107,0.10);
    --activity: #c084d4;
    --activity-bg: rgba(192,132,212,0.10);
    --note: #e06070;
    --note-bg: rgba(224,96,112,0.10);
    --border: rgba(255,255,255,0.06);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }

  .hero {
    position: relative; padding: 52px 20px 36px;
    text-align: center; overflow: hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(224,124,74,0.15), transparent 70%),
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(92,142,224,0.08), transparent),
      var(--bg);
  }
  .hero::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, rgba(224,124,74,0.4), transparent);
  }
  .hero-label {
    display:inline-block; font-size:11px; font-weight:600;
    letter-spacing:2.5px; text-transform:uppercase; color:var(--accent);
    margin-bottom:14px; padding:5px 14px;
    border:1px solid rgba(224,124,74,0.25); border-radius:100px;
  }
  .hero h1 {
    font-family:'DM Serif Display',Georgia,serif;
    font-size:clamp(32px,7vw,50px); font-weight:400;
    letter-spacing:-0.5px; line-height:1.1;
    background:linear-gradient(135deg,#fff 30%,var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .hero-route { font-size:13px; color:var(--text-dim); margin-top:10px; }
  .hero-stats { display:flex; justify-content:center; gap:28px; margin-top:20px; flex-wrap:wrap; }
  .stat-num { font-family:'DM Serif Display',serif; font-size:24px; color:#fff; line-height:1; }
  .stat-label { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1.2px; margin-top:3px; }

  /* Sticky bar */
  .sticky-bar {
    position:sticky; top:0; z-index:100;
    background:rgba(15,17,23,0.88);
    backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
  }
  .search-row { padding:10px 16px 6px; max-width:660px; margin:0 auto; position:relative; }
  .search-row svg { position:absolute; left:30px; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; margin-top:-2px; }
  #searchInput {
    width:100%; padding:10px 14px 10px 40px;
    font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text);
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:100px; outline:none; transition:border-color 0.2s;
  }
  #searchInput:focus { border-color:rgba(224,124,74,0.4); }
  #searchInput::placeholder { color:var(--text-muted); }

  /* Day strip */
  .day-strip {
    display:flex; gap:2px; padding:8px 16px 10px;
    overflow-x:auto; scrollbar-width:none;
    -webkit-overflow-scrolling:touch; scroll-snap-type:x proximity;
  }
  .day-strip::-webkit-scrollbar { display:none; }
  .day-pill {
    display:flex; flex-direction:column; align-items:center;
    min-width:46px; padding:6px 4px 7px; border-radius:12px;
    border:none; background:transparent; cursor:pointer;
    transition:all 0.15s; scroll-snap-align:center;
    -webkit-tap-highlight-color:transparent; position:relative;
    font-family:'DM Sans',sans-serif;
  }
  .day-pill:hover { background:var(--bg-surface); }
  .day-pill .dow { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); line-height:1; }
  .day-pill .num { font-family:'DM Serif Display',serif; font-size:18px; color:var(--text-dim); line-height:1; margin-top:3px; }
  .day-pill .mtag { font-size:8px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-top:3px; line-height:1; }
  .day-pill .dots { display:flex; gap:3px; margin-top:4px; height:4px; }
  .day-pill .dot { width:4px; height:4px; border-radius:50%; }
  .dot.flight { background:var(--flight); }
  .dot.train { background:var(--train); }
  .dot.stay { background:var(--stay); }
  .dot.activity { background:var(--activity); }
  .day-pill.active { background:var(--accent); }
  .day-pill.active .dow, .day-pill.active .num, .day-pill.active .mtag { color:#fff; }
  .day-pill.active .dot { background:rgba(255,255,255,0.7); }
  .day-pill.is-today::after { content:''; position:absolute; bottom:2px; width:14px; height:2px; border-radius:1px; background:var(--accent); }
  .day-pill.active.is-today::after { background:rgba(255,255,255,0.8); }
  .strip-div { display:flex; align-items:center; justify-content:center; min-width:28px; font-size:16px; flex-shrink:0; opacity:0.5; }

  /* Container */
  .container { max-width:660px; margin:0 auto; padding:8px 16px 100px; }

  /* Day card */
  .day-card { margin-bottom:12px; border-radius:var(--radius); background:var(--bg-card); border:1px solid var(--border); overflow:hidden; transition:border-color 0.2s; }
  .day-card:hover { border-color:rgba(255,255,255,0.1); }
  .day-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; cursor:pointer; user-select:none;
    -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
  }
  .day-header:active { background:var(--bg-card-hover); }
  .day-header-left { display:flex; align-items:center; gap:12px; min-width:0; }
  .day-num-box {
    width:44px; height:44px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; border-radius:10px;
    background:var(--bg-surface); flex-shrink:0; line-height:1;
  }
  .day-num-box .dow { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); }
  .day-num-box .num { font-family:'DM Serif Display',serif; font-size:18px; color:#fff; margin-top:1px; }
  .day-info { min-width:0; }
  .day-title { font-size:15px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .day-sub { font-size:12px; color:var(--text-muted); margin-top:2px; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .mbadge { display:inline-flex; align-items:center; font-size:10px; font-weight:600; padding:1px 6px; border-radius:4px; letter-spacing:0.3px; }
  .mbadge.flight { background:var(--flight-bg); color:var(--flight); }
  .mbadge.train { background:var(--train-bg); color:var(--train); }
  .today-tag { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--accent); background:var(--accent-bg); padding:2px 8px; border-radius:4px; }
  .chevron { transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); color:var(--text-muted); flex-shrink:0; }
  .day-card.open .chevron { transform:rotate(180deg); }
  .day-body { max-height:0; overflow:hidden; transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1); }
  .day-card.open .day-body { max-height:3000px; }
  .day-content { padding:0 16px 16px; }
  .day-card.today-card { border-color:rgba(224,124,74,0.3); box-shadow:0 0 20px rgba(224,124,74,0.07); }

  /* Items — timeline layout with prominent time */
  .item { display:flex; gap:0; padding:10px 0; border-top:1px solid var(--border); align-items:stretch; }
  .item:first-child { border-top:none; }
  .item-tcol {
    width:72px; flex-shrink:0; display:flex; flex-direction:column;
    align-items:flex-end; padding-right:14px; padding-top:1px; position:relative;
  }
  .item-tcol::after { content:''; position:absolute; right:0; top:0; bottom:0; width:1px; background:var(--border); }
  .t-main {
    font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600;
    color:#fff; line-height:1.2; text-align:right; white-space:nowrap;
  }
  .t-arr {
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:400;
    color:var(--text-dim); text-align:right; margin-top:2px; white-space:nowrap;
  }
  .t-arr .plus { font-size:9px; opacity:0.5; }
  .t-dot {
    width:6px; height:6px; border-radius:50%; background:var(--bg-surface);
    border:2px solid var(--text-muted); margin-top:7px; flex-shrink:0;
  }
  .item-right { display:flex; gap:10px; padding-left:14px; flex:1; min-width:0; align-items:flex-start; }
  .item-icon { width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:9px; font-size:15px; flex-shrink:0; }
  .item-icon.flight { background:var(--flight-bg); }
  .item-icon.stay { background:var(--stay-bg); }
  .item-icon.train { background:var(--train-bg); }
  .item-icon.bus { background:var(--bus-bg); }
  .item-icon.activity { background:var(--activity-bg); }

function buildStrip(){
  const s=document.getElementById('dayStrip');
  let h='',lr='';
  D.forEach((day,idx)=>{
    const dt=new Date(day.d+'T00:00:00');
    const dow=DW[dt.getDay()].slice(0,3);
    const n=dt.getDate();
    const isT=day.d===ts;
    const sm=idx===0||dt.getDate()===1;
    if(day.r!==lr&&lr) h+=`<div class="strip-div">${RF[day.r]||'·'}</div>`;
    lr=day.r;
    const types=[...new Set(day.i.map(x=>x.y))];
    const dots=types.filter(t=>['flight','train','activity','stay'].includes(t)).slice(0,3).map(t=>`<span class="dot ${t}"></span>`).join('');
    h+=`<button class="day-pill${isT?' is-today':''}" data-date="${day.d}" onclick="jump('${day.d}')">
      <span class="dow">${dow}</span><span class="num">${n}</span>
      ${sm?`<span class="mtag">${MN[dt.getMonth()]}</span>`:''}
      <div class="dots">${dots}</div>
    </button>`;
  });
  s.innerHTML=h;
}

      </div>
      <div class="day-body"><div class="day-content">${ri(day.i)}</div></div>
    </div>`;
  });

  h+=`<div class="section-title">Galápagos Tours & Links</div><div class="links-grid">`;
  GL.forEach(lk=>{
    h+=`<a class="link-card" href="${lk.u}" target="_blank" rel="noopener">
      <div class="ico">🐢</div><div class="lbl">${lk.l}</div>
      <svg class="arw" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
    </a>`;
  });
  h+='</div>';

  h+=`<div class="section-title">Travelers</div><div class="pp-grid">`;
  PP.forEach(t=>{
    h+=`<div class="pp-card">
      <div class="pp-av">${t.f[0]}${t.la[0]}</div>
      <div class="pp-info">
        <div class="pp-name">${t.f} ${t.la}</div>
        <div class="pp-num">${t.p}
          <button class="cp-btn" onclick="cp('${t.p}',this)" title="Copy">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:1px">${t.x}</div>
      </div>
    </div>`;
  });
  h+='</div>';
  c.innerHTML=h;
  if(!document.querySelector('.day-card.today-card')){const f=document.querySelector('.day-card');if(f)f.classList.add('open');}
}

function ri(items){
  return items.map(it=>{
    let tc;
    if(it.tm){
      tc=`<div class="t-main">${it.tm}</div>`;
      if(it.te){
        const e=it.te.replace(/\+1/,' <span class="plus">+1</span>');
        tc+=`<div class="t-arr">▸ ${e}</div>`;
      }
    } else {
      tc=`<div class="t-dot"></div>`;
    }
    let a='';
    if(it.rf){
      a+=`<button class="action-btn" onclick="cp('${it.rf}',this)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        ${it.rf}</button>`;
    }
    if(it.lk) it.lk.forEach(lk=>{
      a+=`<a class="action-btn" href="${lk.u}" target="_blank" rel="noopener">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
        ${lk.l}</a>`;
    });
    if(it.dt&&it.y==='stay'){
      a+=`<button class="action-btn" onclick="cp(\`${it.dt.replace(/`/g,"'")}\`,this)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Address</button>`;
    }
    return `<div class="item" data-type="${it.y}">
      <div class="item-tcol">${tc}</div>
      <div class="item-right">
        <div class="item-icon ${it.y}">${it.ic}</div>
        <div class="item-body">
          <div class="item-label">${it.l}</div>
          ${it.dt?`<div class="item-detail">${it.dt}</div>`:''}
          ${a?`<div class="item-actions">${a}</div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function tog(h){h.closest('.day-card').classList.toggle('open');}

function jump(ds){
  document.querySelectorAll('.day-pill').forEach(p=>p.classList.remove('active'));
  const pill=document.querySelector(`.day-pill[data-date="${ds}"]`);
  if(pill){pill.classList.add('active');pill.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});}
  const card=document.getElementById('day-'+ds);
  if(card){
    card.classList.add('open');
    setTimeout(()=>{
      const bh=document.querySelector('.sticky-bar')?.offsetHeight||0;
      const top=card.getBoundingClientRect().top+window.scrollY-bh-8;
      window.scrollTo({top,behavior:'smooth'});
    },50);
  }
}

function cp(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('copied');toast('Copied!');
    setTimeout(()=>btn.classList.remove('copied'),1500);
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;
    ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    btn.classList.add('copied');toast('Copied!');
    setTimeout(()=>btn.classList.remove('copied'),1500);
  });
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),1500);
}

const si=document.getElementById('searchInput');
let st;
si.addEventListener('input',()=>{clearTimeout(st);st=setTimeout(doSearch,150);});

function doSearch(){
  const q=si.value.toLowerCase().trim();
  document.querySelectorAll('.day-card').forEach(c=>{
    const m=!q||c.textContent.toLowerCase().includes(q);
    c.classList.toggle('hidden',!m);
    if(q&&m)c.classList.add('open');
  });
  document.querySelectorAll('.section-title,.links-grid,.pp-grid').forEach(s=>{
    s.style.display=q?(s.textContent.toLowerCase().includes(q)?'':'none'):'';
  });
}

function updatePill(){
  const bh=document.querySelector('.sticky-bar')?.offsetHeight||0;
  let act=null;
  document.querySelectorAll('.day-card:not(.hidden)').forEach(c=>{
    if(c.getBoundingClientRect().top<bh+100)act=c.dataset.date;
  });
  if(act){
    document.querySelectorAll('.day-pill').forEach(p=>p.classList.toggle('active',p.dataset.date===act));
    const ap=document.querySelector('.day-pill.active');
    if(ap)ap.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }
}

let sf=false;
window.addEventListener('scroll',()=>{
  document.getElementById('scrollTop').classList.toggle('show',window.scrollY>400);
  if(!sf){requestAnimationFrame(()=>{updatePill();sf=false;});sf=true;}
},{passive:true});

buildStrip();
buildDays();
const tp=document.querySelector('.day-pill.is-today');
if(tp){tp.classList.add('active');setTimeout(()=>tp.scrollIntoView({block:'nearest',inline:'center'}),100);}
</script>
